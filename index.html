<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📋</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>智能資訊牆 V12.2</title>
  
  <style>
    body { margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden; }
    #initial-loader { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background-color: #f8fafc; z-index: 9999; transition: opacity 0.5s; }
    .spinner { width: 40px; height: 40px; border: 4px solid #cbd5e1; border-top-color: #4f46e5; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.8/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.8/purify.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-slate-900 text-slate-200">
  
  <div id="initial-loader"><div class="spinner"></div></div>
  <div id="root" class="min-h-screen w-full flex flex-col items-center relative"></div>

  <script type="text/plain" id="appSource">
    /* 系統將讀取此區塊內容傳送至 GAS 進行備份，請手動更新此處存放完整程式碼 */
  </script>

  <script>
    window.runSystemDiagnostics = function() {
      localStorage.clear();
      alert("快取已強制清除，系統即將重啟。");
      window.location.reload(true);
    };
  </script>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo } = React;

    function App() {
      const [items, setItems] = useState([]);
      const [filter, setFilter] = useState('全部');
      const [subFilter, setSubFilter] = useState('全部');
      const [profile, setProfile] = useState(null);
      const [isLoading, setIsLoading] = useState(true);
      const [keyword, setKeyword] = useState('');
      const [page, setPage] = useState(1);
      const [hasMore, setHasMore] = useState(true);
      const [isDarkMode, setIsDarkMode] = useState(true);
      const [isManageMode, setIsManageMode] = useState(false);
      const [selectedIds, setSelectedIds] = useState(new Set());
      const [editingItem, setEditingItem] = useState(null);
      const [confirmDelete, setConfirmDelete] = useState(null);
      const [message, setMessage] = useState(null);
      const [isProcessing, setIsProcessing] = useState(false);
      const [isError, setIsError] = useState(false);
      
      const [isAskAiOpen, setIsAskAiOpen] = useState(false);
      const [askAiQuery, setAskAiQuery] = useState('');
      const [askAiResponse, setAskAiResponse] = useState('');
      const [isAskAiLoading, setIsAskAiLoading] = useState(false);

      const GAS_URL = 'https://script.google.com/macros/s/AKfycbwOtD3IcS0tzeHMTbvPNk7wZtm6ShTfzkQ7HaqNY_kMMkJEJRW0_ucxmcO3Qoeb1chi/exec'; 
      const LIFF_ID = '2009406684-H9fk9ysT';

      const showMessage = (msg) => { setMessage(msg); setTimeout(() => setMessage(null), 3000); };

      const fetchData = useCallback(async (searchKw = '', pageNum = 1) => {
        setIsLoading(true); setIsError(false);
        try {
          let url = `${GAS_URL}?limit=20&page=${pageNum}`;
          if (searchKw) url += `&keyword=${encodeURIComponent(searchKw)}`;
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 10000);
          const res = await fetch(url, { redirect: 'follow', signal: controller.signal });
          clearTimeout(timeoutId);
          const data = await res.json();
          if (Array.isArray(data)) {
            if (pageNum === 1) { setItems(data); localStorage.setItem('infoWallCache', JSON.stringify(data)); } 
            else { setItems(prev => { const newData = [...prev, ...data]; localStorage.setItem('infoWallCache', JSON.stringify(newData)); return newData; }); }
            setHasMore(data.length === 20);
          } else throw new Error("API 異常");
        } catch (e) { setIsError(true); showMessage("讀取失敗"); } 
        finally { setIsLoading(false); const loader = document.getElementById('initial-loader'); if(loader) loader.style.display = 'none'; }
      }, []);

      useEffect(() => {
        const init = async () => {
          const cached = localStorage.getItem('infoWallCache');
          if (cached) { try { const parsed = JSON.parse(cached); if (Array.isArray(parsed)) { setItems(parsed); setIsLoading(false); const loader = document.getElementById('initial-loader'); if(loader) loader.style.display = 'none'; } } catch (e) {} }
          if (window.liff) { try { await window.liff.init({ liffId: LIFF_ID }); if (window.liff.isLoggedIn()) setProfile(await window.liff.getProfile()); } catch (e) {} }
          fetchData('', 1);
        };
        init();
      }, [fetchData]);

      useEffect(() => { if (page > 1) fetchData(keyword, page); }, [page, keyword, fetchData]);
      useEffect(() => {
        const handleScroll = () => { if (window.innerHeight + document.documentElement.scrollTop >= document.documentElement.offsetHeight - 100) if (!isLoading && hasMore && !isError) setPage(p => p + 1); };
        window.addEventListener('scroll', handleScroll); return () => window.removeEventListener('scroll', handleScroll);
      }, [isLoading, hasMore, isError]);

      const toggleSelection = (id) => { const newSet = new Set(selectedIds); newSet.has(id) ? newSet.delete(id) : newSet.add(id); setSelectedIds(newSet); };
      
      const handleBatchDelete = async () => {
        if (selectedIds.size === 0) return;
        setIsProcessing(true);
        try {
          const idsArray = Array.from(selectedIds);
          const target = `${GAS_URL}?action=deleteBatch&ids=${encodeURIComponent(JSON.stringify(idsArray))}`;
          const res = await fetch(target, { redirect: 'follow' });
          const result = await res.json();
          if (result?.success) {
            setItems(prev => {
              const newData = prev.filter(i => !selectedIds.has(i.id));
              localStorage.setItem('infoWallCache', JSON.stringify(newData));
              return newData;
            });
            showMessage(`已刪除 ${selectedIds.size} 筆資料`);
            setSelectedIds(new Set());
            setIsManageMode(false);
          } else { showMessage("批次刪除失敗"); }
        } catch (e) { showMessage("網路連線錯誤"); }
        setIsProcessing(false);
      };

      const executeDelete = async () => {
        if (!confirmDelete) return;
        setIsProcessing(true);
        try {
          const target = `${GAS_URL}?action=delete&id=${confirmDelete.id}&url=${encodeURIComponent(confirmDelete.url)}`;
          const res = await fetch(target, { redirect: 'follow' });
          const result = await res.json();
          if (result?.success) {
            setItems(prev => {
              const newData = prev.filter(i => i.id !== confirmDelete.id);
              localStorage.setItem('infoWallCache', JSON.stringify(newData));
              return newData;
            });
            showMessage("刪除成功");
          } else { showMessage("刪除失敗"); }
        } catch (e) { showMessage("網路連線錯誤"); }
        setIsProcessing(false);
        setConfirmDelete(null);
      };

      const saveEdit = async () => {
        if (!editingItem) return;
        setIsProcessing(true);
        try {
          const payload = {
            action: 'updateFull',
            id: editingItem.id,
            title: encodeURIComponent(editingItem.title || ''),
            content: encodeURIComponent(editingItem.content || ''),
            type: editingItem.type,
            subcategory: encodeURIComponent(editingItem.subcategory || '')
          };
          const res = await fetch(GAS_URL, { redirect: 'follow', method: 'POST', body: JSON.stringify(payload) });
          const result = await res.json();
          if (result?.success) {
            setItems(prev => {
              const newData = prev.map(i => i.id === editingItem.id ? editingItem : i);
              localStorage.setItem('infoWallCache', JSON.stringify(newData));
              return newData;
            });
            showMessage("更新成功");
          } else { showMessage("更新失敗"); }
        } catch (e) { showMessage("網路錯誤"); }
        setIsProcessing(false);
        setEditingItem(null);
      };

      const handleToggleTodo = async (id, currentContent, lineIndex) => {
        const lines = currentContent.split('\n');
        lines[lineIndex] = lines[lineIndex].includes('- [ ]') ? lines[lineIndex].replace('- [ ]', '- [x]') : lines[lineIndex].replace('- [x]', '- [ ]');
        const newContent = lines.join('\n');
        setItems(prev => { const newData = prev.map(item => item.id === id ? { ...item, content: newContent } : item); localStorage.setItem('infoWallCache', JSON.stringify(newData)); return newData; });
        fetch(GAS_URL, { redirect: 'follow', method: 'POST', body: JSON.stringify({ action: 'updateFull', id, content: encodeURIComponent(newContent) }) });
      };

      const handleBackup = async () => {
        const sourceCode = document.getElementById('appSource')?.textContent?.trim();
        if (!sourceCode) return showMessage("備份失敗：未找到 appSource 區塊");
        setIsProcessing(true);
        try {
          const res = await fetch(GAS_URL, { redirect: 'follow', method: 'POST', body: JSON.stringify({ action: 'backup', sourceCode }) });
          const result = await res.json();
          if (result?.success) showMessage("原始碼備份成功");
          else showMessage("備份寫入失敗");
        } catch (e) { showMessage("備份連線錯誤"); }
        setIsProcessing(false);
      };

      const handleSearch = (e) => { e.preventDefault(); setPage(1); fetchData(keyword, 1); };
      const handleExport = () => window.open(`${GAS_URL}?action=export`, '_blank');
      const getThumbnail = (url) => { if (!url || !url.includes('drive.google.com')) return null; const match = url.match(/\/d\/(.+?)\//) || url.match(/id=(.+?)(&|$)/); return match ? `https://drive.google.com/thumbnail?id=${match[1]}&sz=w400` : null; };
      const generateCalendarUrl = (title, details) => { const url = new URL('https://calendar.google.com/calendar/render'); url.searchParams.append('action', 'TEMPLATE'); url.searchParams.append('text', title || ''); url.searchParams.append('details', details || ''); return url.toString(); };

      const handleAskAI = async () => {
        if (!askAiQuery.trim()) return;
        setIsAskAiLoading(true);
        setAskAiResponse('');
        try {
          const contextData = filtered.map(i => `[${i.type}] ${i.title}: ${i.content}`).join('\n\n').substring(0, 10000);
          const res = await fetch(GAS_URL, { redirect: 'follow', method: 'POST', body: JSON.stringify({ action: 'askAI', question: askAiQuery, context: contextData }) });
          const result = await res.json();
          if (result.success) setAskAiResponse(result.answer); else setAskAiResponse("發生錯誤，請稍後再試。");
        } catch (e) { setAskAiResponse("網路連線異常，無法聯繫知識庫。"); }
        setIsAskAiLoading(false);
      };

      const filterMap = { '全部': 'all', '待辦': 'todo', '行程': 'event', '好文': 'article', '檔案': 'file' };
      const subcategories = useMemo(() => { if (!Array.isArray(items)) return ['全部']; return ['全部', ...new Set(items.filter(i => i.type === 'article').map(i => i.subcategory || '未分類'))]; }, [items]);
      const filtered = useMemo(() => { if (!Array.isArray(items)) return []; return items.filter(i => { const typeMatch = filter === '全部' ? true : i.type === filterMap[filter]; const subMatch = (filter === '好文' && subFilter !== '全部') ? (i.subcategory === subFilter || (!i.subcategory && subFilter === '未分類')) : true; return typeMatch && subMatch; }); }, [items, filter, subFilter]);

      const todoStats = useMemo(() => {
        let total = 0, completed = 0;
        filtered.forEach(item => { if (item.type === 'todo') { (item.content || '').split('\n').forEach(line => { if (line.includes('- [ ]') || line.includes('- [x]')) { total++; if (line.includes('- [x]')) completed++; } }); } });
        return { total, completed, percent: total === 0 ? 0 : Math.round((completed / total) * 100) };
      }, [filtered]);

      return (
        <div className={`w-full max-w-7xl mx-auto px-4 py-2 h-full flex flex-col font-sans transition-colors duration-300 ${isDarkMode ? 'bg-slate-900 text-slate-100' : 'bg-slate-50 text-slate-900'}`}>
          <header className={`sticky top-0 z-40 border-b backdrop-blur-xl transition-colors duration-300 ${isDarkMode ? 'bg-slate-900/80 border-slate-700/50' : 'bg-white/80 border-slate-200/50'}`}>
            <div className="py-3 flex justify-between items-center">
              <div className="flex items-center gap-2">
                <div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold">📋</div>
                <h1 className="text-lg font-black tracking-tighter hidden sm:block">資訊牆 V12.2</h1>
              </div>
              <div className="flex items-center gap-2">
                <button onClick={handleExport} className="px-3 py-1.5 bg-emerald-500 text-white rounded-lg text-xs font-black transition-colors hover:bg-emerald-600">匯出 CSV</button>
                <button onClick={handleBackup} disabled={isProcessing} className="px-3 py-1.5 bg-amber-500 text-white rounded-lg text-xs font-black transition-colors disabled:opacity-50">原始碼備份</button>
                <button onClick={() => setIsDarkMode(!isDarkMode)} className={`p-2 rounded-lg text-xs font-bold transition-colors ${isDarkMode ? 'bg-slate-800 text-yellow-400' : 'bg-slate-100 text-slate-600'}`}>{isDarkMode ? '☀️' : '🌙'}</button>
                <button onClick={() => { setIsManageMode(!isManageMode); setSelectedIds(new Set()); }} className={`px-3 py-1.5 rounded-lg text-xs font-black transition-colors ${isManageMode ? 'bg-indigo-600 text-white' : (isDarkMode ? 'bg-slate-800 text-slate-300' : 'bg-slate-100 text-slate-600')}`}>批次管理</button>
                {profile && <img src={profile.pictureUrl} className="w-8 h-8 rounded-lg object-cover border border-slate-200" alt="" />}
              </div>
            </div>
            
            {(filter === '全部' || filter === '待辦') && todoStats.total > 0 && (
              <div className="pb-3 px-1">
                <div className="flex justify-between text-xs font-bold mb-1"><span className="text-slate-400">任務達成率</span><span className="text-indigo-500">{todoStats.percent}% ({todoStats.completed}/{todoStats.total})</span></div>
                <div className="w-full h-1.5 bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden"><div className="h-full bg-indigo-500 transition-all duration-500" style={{ width: `${todoStats.percent}%` }}></div></div>
              </div>
            )}

            <div className="pb-3 flex flex-col sm:flex-row gap-3 sm:items-center justify-between">
              <div className="flex gap-1.5 overflow-x-auto no-scrollbar py-1">
                {['全部', '待辦', '行程', '好文', '檔案'].map(t => (
                  <button key={t} onClick={() => { setFilter(t); setSubFilter('全部'); setPage(1); }} className={`px-4 py-1.5 rounded-xl text-[11px] font-black whitespace-nowrap transition-all ${filter === t ? 'bg-indigo-600 text-white shadow-md' : (isDarkMode ? 'bg-slate-800 text-slate-400' : 'bg-white text-slate-400 border border-slate-200/60')}`}>{t}</button>
                ))}
              </div>
              <form onSubmit={handleSearch} className="flex gap-2">
                <input type="text" value={keyword} onChange={(e) => setKeyword(e.target.value)} placeholder="搜尋關鍵字..." className={`px-3 py-1.5 rounded-lg text-sm focus:outline-none w-full sm:w-48 transition-colors ${isDarkMode ? 'bg-slate-800 text-white border-slate-700' : 'bg-white border-slate-200'}`} />
                <button type="submit" className="px-3 py-1.5 bg-indigo-600 text-white rounded-lg text-sm font-bold">搜尋</button>
              </form>
            </div>
            
            {filter === '好文' && subcategories.length > 1 && (
              <div className="pb-3 flex gap-2 overflow-x-auto no-scrollbar">
                {subcategories.map(sub => (
                  <button key={sub} onClick={() => setSubFilter(sub)} className={`px-3 py-1 rounded-full text-[10px] font-bold whitespace-nowrap transition-all ${subFilter === sub ? 'bg-emerald-500 text-white' : (isDarkMode ? 'bg-slate-700 text-slate-300' : 'bg-slate-100 text-slate-500')}`}>
                    # {sub}
                  </button>
                ))}
              </div>
            )}

            {isManageMode && (
              <div className={`py-2 border-t flex justify-between items-center ${isDarkMode ? 'border-slate-700 bg-slate-800/50' : 'border-slate-200 bg-indigo-50/50'}`}>
                <span className="text-sm font-bold text-indigo-500">已選擇 {selectedIds.size} 筆</span>
                <button onClick={handleBatchDelete} disabled={selectedIds.size === 0 || isProcessing} className="px-4 py-1.5 bg-red-500 text-white rounded-lg text-xs font-bold disabled:opacity-50">刪除選取</button>
              </div>
            )}
          </header>

          <main className="py-6 flex-1 pb-24">
            <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4 items-start">
              {filtered.map(item => {
                const thumb = getThumbnail(item?.url);
                const isSelected = selectedIds.has(item?.id);
                return (
                  <div key={item?.id} onClick={() => isManageMode && toggleSelection(item.id)} className={`group rounded-2xl border shadow-sm transition-all overflow-hidden flex flex-col relative ${isManageMode ? 'cursor-pointer' : ''} ${isDarkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-100'} ${isSelected ? 'ring-2 ring-indigo-500' : ''}`}>
                    
                    {!isManageMode && (
                      <div className="absolute top-2 right-2 z-10 flex gap-1 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity">
                        <button onClick={(e) => { e.stopPropagation(); setEditingItem(item); }} className="w-8 h-8 bg-blue-500 text-white rounded-full flex items-center justify-center text-xs shadow">✏️</button>
                        <button onClick={(e) => { e.stopPropagation(); setConfirmDelete({id: item.id, url: item.url}); }} className="w-8 h-8 bg-red-500 text-white rounded-full flex items-center justify-center text-xs shadow">✕</button>
                      </div>
                    )}
                    
                    {item?.type === 'file' && thumb && (
                      <div onClick={(e) => { if (!isManageMode) window.open(item.url); e.stopPropagation(); }} className="w-full h-32 overflow-hidden cursor-pointer">
                        <img src={thumb} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" alt="" />
                      </div>
                    )}

                    <div className="p-4">
                      <div className="flex items-center gap-2 mb-3">
                        <div className={`px-2 py-1 rounded text-[10px] font-black uppercase ${item?.color || 'bg-slate-100 text-slate-600'} ${isDarkMode && item?.color?.includes('slate') ? 'bg-slate-700 text-slate-300' : ''}`}>
                          {item?.icon} {item?.type?.toUpperCase()}
                        </div>
                        {item?.type === 'article' && item?.subcategory && (
                           <span className="px-2 py-1 rounded text-[10px] font-bold bg-emerald-100 text-emerald-700 dark:bg-emerald-900/50 dark:text-emerald-400">
                             {item.subcategory}
                           </span>
                        )}
                        <span className="text-[10px] font-bold text-slate-400 ml-auto">{item?.date} {item?.time}</span>
                      </div>
                      
                      <h2 onClick={(e) => { if (!isManageMode && item?.type !== 'todo' && item?.url) window.open(item.url); e.stopPropagation(); }} className={`text-base font-black leading-tight mb-2 ${isDarkMode ? 'text-slate-100' : 'text-slate-800'} ${item?.type !== 'todo' && !isManageMode ? 'cursor-pointer hover:text-indigo-500' : ''}`}>
                        {item?.title ?? '無標題'}
                      </h2>
                      
                      {item?.type === 'todo' ? (
                        <div className="space-y-2 mt-3">
                          {(item?.content || '').split('\n').map((line, idx) => {
                            const isChecked = line.includes('- [x]');
                            const isTodo = line.includes('- [ ]') || isChecked;
                            if (!isTodo) return <p key={idx} className="text-xs text-slate-500">{line}</p>;
                            return (
                              <div key={idx} className="flex items-start gap-2 cursor-pointer group/todo" onClick={(e) => { if (!isManageMode) handleToggleTodo(item.id, item.content, idx); e.stopPropagation(); }}>
                                <div className={`mt-0.5 flex-shrink-0 w-4 h-4 rounded border flex items-center justify-center transition-colors ${isChecked ? 'bg-indigo-500 border-indigo-500 text-white' : 'border-slate-400 group-hover/todo:border-indigo-400'}`}>
                                  {isChecked && <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" /></svg>}
                                </div>
                                <span className={`text-sm font-medium ${isChecked ? 'text-slate-500 line-through' : ''}`}>{line.replace(/- \[(x| )\] /, '')}</span>
                              </div>
                            );
                          })}
                        </div>
                      ) : ( <div className="rounded-xl p-3 text-xs font-medium leading-relaxed max-h-[120px] overflow-y-auto whitespace-pre-wrap" dangerouslySetInnerHTML={{ __html: DOMPurify.sanitize(item?.content ?? '') }} /> )}

                      {item?.type === 'event' && (
                        <a href={generateCalendarUrl(item?.title, item?.content)} target="_blank" rel="noreferrer" className={`mt-4 flex items-center justify-center gap-2 w-full py-2 rounded-xl text-xs font-black transition-colors ${isDarkMode ? 'bg-blue-900/50 hover:bg-blue-800/50 text-blue-400' : 'bg-blue-50 hover:bg-blue-100 text-blue-600'}`}>
                          📅 加入 Google 行事曆
                        </a>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
            {isLoading && !isError && <div className="py-10 text-center text-indigo-400 font-bold animate-pulse text-sm">數據同步中...</div>}
          </main>

          <button onClick={() => setIsAskAiOpen(!isAskAiOpen)} className="fixed bottom-6 right-6 z-50 w-14 h-14 bg-indigo-600 rounded-full shadow-2xl flex items-center justify-center text-white text-2xl hover:scale-110 transition-transform">✨</button>
          
          {isAskAiOpen && (
            <div className={`fixed bottom-24 right-6 z-50 w-[calc(100%-3rem)] sm:w-96 rounded-3xl shadow-2xl border flex flex-col overflow-hidden transition-colors ${isDarkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-200'}`}>
              <div className="p-4 bg-indigo-600 text-white font-black flex justify-between items-center">
                <span>知識庫專屬助理</span>
                <button onClick={() => setIsAskAiOpen(false)} className="opacity-70 hover:opacity-100 text-lg">✕</button>
              </div>
              <div className="p-4 flex-1 h-64 overflow-y-auto flex flex-col gap-3 text-sm">
                <div className="bg-indigo-50 dark:bg-indigo-900/30 text-indigo-800 dark:text-indigo-200 p-3 rounded-2xl rounded-tl-none self-start max-w-[90%]">您好！您可以針對目前畫面上過濾出的資料問我任何問題。</div>
                {askAiResponse && <div className="bg-slate-100 dark:bg-slate-700 p-3 rounded-2xl rounded-tl-none self-start max-w-[90%] whitespace-pre-wrap leading-relaxed">{askAiResponse}</div>}
                {isAskAiLoading && <div className="text-indigo-500 font-bold animate-pulse text-xs ml-2">分析大腦知識庫中...</div>}
              </div>
              <div className="p-3 border-t dark:border-slate-700 flex gap-2">
                <input type="text" value={askAiQuery} onChange={(e) => setAskAiQuery(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleAskAI()} placeholder="詢問當前分類的資料..." className={`flex-1 px-3 py-2 rounded-xl text-sm outline-none border ${isDarkMode ? 'bg-slate-900 border-slate-700 text-white' : 'bg-slate-50 border-slate-200'}`} />
                <button onClick={handleAskAI} disabled={isAskAiLoading || !askAiQuery.trim()} className="bg-indigo-600 text-white px-4 rounded-xl text-sm font-bold disabled:opacity-50 hover:bg-indigo-700 transition-colors">送出</button>
              </div>
            </div>
          )}

        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
