<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📋</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>智能資訊牆 V12.6</title>
  
  <style>
    body { margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden; }
    #initial-loader { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background-color: #f8fafc; z-index: 9999; transition: opacity 0.5s; }
    .spinner { width: 40px; height: 40px; border: 4px solid #cbd5e1; border-top-color: #4f46e5; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .virtual-card { content-visibility: auto; contain-intrinsic-size: 1px 300px; }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.8/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.8/purify.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-slate-900 text-slate-200">
  
  <div id="initial-loader"><div class="spinner"></div></div>
  <div id="root" class="min-h-screen w-full flex flex-col items-center relative"></div>

  <script type="text/plain" id="appSource">
    /* 系統將讀取此區塊內容傳送至 GAS 進行備份，請手動更新此處存放完整程式碼 */
  </script>

  <script>
    window.runSystemDiagnostics = function() {
      localStorage.clear();
      alert("本機資料已清除，系統即將重啟。");
      window.location.reload(true);
    };
  </script>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo, useRef } = React;

    const LazyImage = ({ src, alt, className }) => {
      const [isLoaded, setIsLoaded] = useState(false);
      const imgRef = useRef();

      useEffect(() => {
        const observer = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting) {
            setIsLoaded(true);
            observer.disconnect();
          }
        });
        if (imgRef.current) observer.observe(imgRef.current);
        return () => observer.disconnect();
      }, [src]);

      return (
        <div ref={imgRef} className={`w-full h-full bg-slate-200 dark:bg-slate-700 ${!isLoaded ? 'animate-pulse' : ''}`}>
          {isLoaded && <img src={src} alt={alt} className={className} />}
        </div>
      );
    };

    function App() {
      const [items, setItems] = useState([]);
      const [filter, setFilter] = useState('全部');
      const [subFilter, setSubFilter] = useState('全部');
      const [profile, setProfile] = useState(null);
      const [isLoading, setIsLoading] = useState(true);
      const [keyword, setKeyword] = useState('');
      const [startDate, setStartDate] = useState('');
      const [endDate, setEndDate] = useState('');
      const [showAdvanced, setShowAdvanced] = useState(false);
      
      const [currentPage, setCurrentPage] = useState(1);
      const ITEMS_PER_PAGE = 20;

      const [isDarkMode, setIsDarkMode] = useState(true);
      const [isManageMode, setIsManageMode] = useState(false);
      const [selectedIds, setSelectedIds] = useState(new Set());
      const [editingItem, setEditingItem] = useState(null);
      const [confirmDelete, setConfirmDelete] = useState(null);
      const [message, setMessage] = useState(null);
      const [isProcessing, setIsProcessing] = useState(false);
      const [isError, setIsError] = useState(false);
      const [pwaPrompt, setPwaPrompt] = useState(null);
      
      const [isAskAiOpen, setIsAskAiOpen] = useState(false);
      const [askAiQuery, setAskAiQuery] = useState('');
      const [askAiResponse, setAskAiResponse] = useState('');
      const [isAskAiLoading, setIsAskAiLoading] = useState(false);

      const [isTagManagerOpen, setIsTagManagerOpen] = useState(false);
      const [tagMergeSources, setTagMergeSources] = useState([]);
      const [tagMergeTarget, setTagMergeTarget] = useState('');

      const GAS_URL = 'https://script.google.com/macros/s/AKfycbwOtD3IcS0tzeHMTbvPNk7wZtm6ShTfzkQ7HaqNY_kMMkJEJRW0_ucxmcO3Qoeb1chi/exec'; 
      const LIFF_ID = '2009406684-H9fk9ysT';

      const showMessage = useCallback((msg) => { setMessage(msg); setTimeout(() => setMessage(null), 3000); }, []);

      useEffect(() => {
        const manifest = {
          name: "智能資訊牆", short_name: "資訊牆", start_url: ".", display: "standalone",
          background_color: "#0f172a", theme_color: "#4f46e5",
          icons: [{ src: "data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📋</text></svg>", sizes: "192x192", type: "image/svg+xml" }]
        };
        const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
        const manifestUrl = URL.createObjectURL(blob);
        const link = document.createElement('link');
        link.rel = 'manifest'; link.href = manifestUrl; document.head.appendChild(link);

        const handleBeforeInstallPrompt = (e) => { e.preventDefault(); setPwaPrompt(e); };
        window.addEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
        return () => window.removeEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
      }, []);

      const installPWA = async () => {
        if (!pwaPrompt) return;
        pwaPrompt.prompt();
        const { outcome } = await pwaPrompt.userChoice;
        if (outcome === 'accepted') setPwaPrompt(null);
      };

      const fetchData = useCallback(async () => {
        setIsLoading(true); setIsError(false);
        try {
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 15000);
          const res = await fetch(GAS_URL, { redirect: 'follow', signal: controller.signal });
          clearTimeout(timeoutId);
          const data = await res.json();
          
          if (data && data.error) throw new Error(`後端回應: ${data.message}`);
          
          if (Array.isArray(data)) {
            setItems(data); 
            localStorage.setItem('infoWallCache', JSON.stringify(data));
          } else throw new Error("API 資料格式異常");
        } catch (e) { setIsError(true); showMessage(e.message || "網路讀取失敗"); } 
        finally { setIsLoading(false); const loader = document.getElementById('initial-loader'); if(loader) loader.style.display = 'none'; }
      }, [showMessage]);

      useEffect(() => {
        const init = async () => {
          const cached = localStorage.getItem('infoWallCache');
          if (cached) { try { const parsed = JSON.parse(cached); if (Array.isArray(parsed)) { setItems(parsed); setIsLoading(false); const loader = document.getElementById('initial-loader'); if(loader) loader.style.display = 'none'; } } catch (e) {} }
          if (window.liff) { try { await window.liff.init({ liffId: LIFF_ID }); if (window.liff.isLoggedIn()) setProfile(await window.liff.getProfile()); } catch (e) {} }
          fetchData();
        };
        init();
      }, [fetchData]);

      const handleOpenUrl = (e, url) => {
        e.stopPropagation();
        if (!url || url === '#') return;
        if (window.liff && window.liff.isInClient()) {
          window.liff.openWindow({ url: url, external: false });
        } else {
          window.open(url, '_blank');
        }
      };

      const toggleSelection = (id) => { const newSet = new Set(selectedIds); newSet.has(id) ? newSet.delete(id) : newSet.add(id); setSelectedIds(newSet); };
      
      const handleBatchDelete = async () => {
        if (selectedIds.size === 0) return;
        setIsProcessing(true);
        try {
          const idsArray = Array.from(selectedIds);
          const target = `${GAS_URL}?action=deleteBatch&ids=${encodeURIComponent(JSON.stringify(idsArray))}`;
          const res = await fetch(target, { redirect: 'follow' });
          const result = await res.json();
          if (result?.success) {
            setItems(prev => prev.filter(i => !selectedIds.has(i.id)));
            showMessage(`已刪除 ${selectedIds.size} 筆資料`);
            setSelectedIds(new Set());
            setIsManageMode(false);
          } else showMessage("批次刪除失敗");
        } catch (e) { showMessage("網路連線錯誤"); }
        setIsProcessing(false);
      };

      const handleBatchArchive = async () => {
        if (selectedIds.size === 0) return;
        setIsProcessing(true);
        try {
          const idsArray = Array.from(selectedIds);
          const target = `${GAS_URL}?action=archiveBatch&ids=${encodeURIComponent(JSON.stringify(idsArray))}`;
          const res = await fetch(target, { redirect: 'follow' });
          const result = await res.json();
          if (result?.success) {
            setItems(prev => prev.filter(i => !selectedIds.has(i.id)));
            showMessage(`已成功封存 ${selectedIds.size} 筆資料`);
            setSelectedIds(new Set());
            setIsManageMode(false);
          } else showMessage("批次封存失敗");
        } catch (e) { showMessage("網路連線錯誤"); }
        setIsProcessing(false);
      };

      const executeDelete = async () => {
        if (!confirmDelete) return;
        setIsProcessing(true);
        try {
          const target = `${GAS_URL}?action=delete&id=${confirmDelete.id}&url=${encodeURIComponent(confirmDelete.url)}`;
          const res = await fetch(target, { redirect: 'follow' });
          const result = await res.json();
          if (result?.success) {
            setItems(prev => prev.filter(i => i.id !== confirmDelete.id));
            showMessage("刪除成功");
          } else showMessage("刪除失敗");
        } catch (e) { showMessage("網路連線錯誤"); }
        setIsProcessing(false);
        setConfirmDelete(null);
      };

      const saveEdit = async () => {
        if (!editingItem) return;
        setIsProcessing(true);
        try {
          const payload = { action: 'updateFull', id: editingItem.id, title: encodeURIComponent(editingItem.title || ''), content: encodeURIComponent(editingItem.content || ''), type: editingItem.type, subcategory: encodeURIComponent(editingItem.subcategory || '') };
          const res = await fetch(GAS_URL, { redirect: 'follow', method: 'POST', body: JSON.stringify(payload) });
          const result = await res.json();
          if (result?.success) {
            setItems(prev => prev.map(i => i.id === editingItem.id ? editingItem : i));
            showMessage("更新成功");
          } else showMessage("更新失敗");
        } catch (e) { showMessage("網路錯誤"); }
        setIsProcessing(false);
        setEditingItem(null);
      };

      const handleMergeTags = async () => {
        if (tagMergeSources.length === 0 || !tagMergeTarget || tagMergeSources.includes(tagMergeTarget)) return;
        setIsProcessing(true);
        try {
          const payload = { action: 'mergeTags', oldTags: tagMergeSources, newTag: tagMergeTarget };
          const res = await fetch(GAS_URL, { redirect: 'follow', method: 'POST', body: JSON.stringify(payload) });
          const result = await res.json();
          if (result?.success) {
            setItems(prev => prev.map(item => {
              if (item.type !== 'article' || !item.subcategory) return item;
              const tags = item.subcategory.split(/[,、]/).map(s=>s.trim());
              let hasChanges = false;
              const newTags = tags.map(t => {
                if (tagMergeSources.includes(t)) { hasChanges = true; return tagMergeTarget; }
                return t;
              });
              if (hasChanges) return { ...item, subcategory: [...new Set(newTags)].join(', ') };
              return item;
            }));
            showMessage(`已將 ${tagMergeSources.length} 個標籤合併為「${tagMergeTarget}」並寫入記憶`);
            setIsTagManagerOpen(false); setTagMergeSources([]); setTagMergeTarget('');
          } else showMessage("合併失敗");
        } catch (e) { showMessage("網路連線錯誤"); }
        setIsProcessing(false);
      };

      const handleToggleTodo = async (id, currentContent, lineIndex) => {
        const lines = currentContent.split('\n');
        lines[lineIndex] = lines[lineIndex].includes('- [ ]') ? lines[lineIndex].replace('- [ ]', '- [x]') : lines[lineIndex].replace('- [x]', '- [ ]');
        const newContent = lines.join('\n');
        setItems(prev => prev.map(item => item.id === id ? { ...item, content: newContent } : item));
        fetch(GAS_URL, { redirect: 'follow', method: 'POST', body: JSON.stringify({ action: 'updateFull', id, content: encodeURIComponent(newContent) }) });
      };

      const handleToggleCompleted = async (item, e) => {
        e.preventDefault(); e.stopPropagation();
        const isCompleted = item?.title?.includes('[已完成]');
        let newTitle = item.title || '無標題';
        let newContent = item.content;
        
        if (isCompleted) newTitle = newTitle.replace(/\[已完成\]\s*/g, '');
        else {
          newTitle = `[已完成] ${newTitle}`;
          if (item.type === 'todo' && newContent) newContent = newContent.replace(/- \[ \]/g, '- [x]');
        }
        
        setItems(prev => prev.map(i => i.id === item.id ? { ...i, title: newTitle, content: item.type === 'todo' ? newContent : i.content } : i));
        try {
          const payload = { action: 'updateFull', id: item.id, title: encodeURIComponent(newTitle), type: item.type };
          if (item.type === 'todo') payload.content = encodeURIComponent(newContent);
          await fetch(GAS_URL, { redirect: 'follow', method: 'POST', body: JSON.stringify(payload) });
        } catch (err) {}
      };

      const handleBackup = async () => {
        const sourceCode = document.getElementById('appSource')?.textContent?.trim();
        if (!sourceCode) return showMessage("備份失敗：未找到 appSource 區塊");
        setIsProcessing(true);
        try {
          const res = await fetch(GAS_URL, { redirect: 'follow', method: 'POST', body: JSON.stringify({ action: 'backup', sourceCode }) });
          const result = await res.json();
          if (result?.success) showMessage("原始碼備份成功"); else showMessage("備份寫入失敗");
        } catch (e) { showMessage("備份連線錯誤"); }
        setIsProcessing(false);
      };

      const handleSearch = (e) => { e.preventDefault(); setCurrentPage(1); };
      const handleExport = () => window.open(`${GAS_URL}?action=export`, '_blank');
      const getThumbnail = (url) => { if (!url || !url.includes('drive.google.com')) return null; const match = url.match(/\/d\/(.+?)\//) || url.match(/id=(.+?)(&|$)/); return match ? `https://drive.google.com/thumbnail?id=${match[1]}&sz=w400` : null; };
      const generateCalendarUrl = (title, details) => { const url = new URL('https://calendar.google.com/calendar/render'); url.searchParams.append('action', 'TEMPLATE'); url.searchParams.append('text', title || ''); url.searchParams.append('details', details || ''); return url.toString(); };
      const getTags = (subcatStr) => { if (!subcatStr) return []; return subcatStr.split(/[,、]/).map(s => s.trim()).filter(Boolean); };

      const handleAskAI = async () => {
        if (!askAiQuery.trim()) return;
        setIsAskAiLoading(true); setAskAiResponse('');
        try {
          const contextData = filteredAndSorted.map(i => `[${i.type}] ${i.title}: ${i.content}`).join('\n\n').substring(0, 10000);
          const res = await fetch(GAS_URL, { redirect: 'follow', method: 'POST', body: JSON.stringify({ action: 'askAI', question: askAiQuery, context: contextData }) });
          const result = await res.json();
          if (result.success) setAskAiResponse(result.answer); else setAskAiResponse("發生錯誤，請稍後再試。");
        } catch (e) { setAskAiResponse("網路連線異常，無法聯繫知識庫。"); }
        setIsAskAiLoading(false);
      };

      const filterMap = { '全部': 'all', '待辦': 'todo', '行程': 'event', '好文': 'article', '檔案': 'file' };
      const subcategories = useMemo(() => { 
        if (!Array.isArray(items)) return ['全部']; 
        const allTags = items.filter(i => i.type === 'article').flatMap(i => getTags(i.subcategory));
        return ['全部', ...new Set(allTags.length ? allTags : ['未分類'])]; 
      }, [items]);
      
      const filteredAndSorted = useMemo(() => { 
        if (!Array.isArray(items)) return []; 
        let result = items.filter(i => { 
          const typeMatch = filter === '全部' ? true : i.type === filterMap[filter]; 
          const tags = getTags(i.subcategory);
          const subMatch = (filter === '好文' && subFilter !== '全部') ? (tags.includes(subFilter) || (tags.length === 0 && subFilter === '未分類')) : true; 
          let dateMatch = true;
          if (startDate && i.date) dateMatch = dateMatch && (i.date >= startDate);
          if (endDate && i.date) dateMatch = dateMatch && (i.date <= endDate);
          return typeMatch && subMatch && dateMatch; 
        }); 

        if (keyword) {
          const kw = keyword.toLowerCase();
          result = result.map(i => {
            let score = 0;
            const title = (i.title || '').toLowerCase();
            const content = (i.content || '').toLowerCase();
            if (title === kw) score += 100; else if (title.includes(kw)) score += 50;
            if (content === kw) score += 20; else if (content.includes(kw)) score += 10;
            return { ...i, _score: score };
          }).filter(i => i._score > 0).sort((a, b) => b._score - a._score);
        }
        return result;
      }, [items, filter, subFilter, keyword, startDate, endDate]);

      const totalPages = Math.max(1, Math.ceil(filteredAndSorted.length / ITEMS_PER_PAGE));
      const currentItems = filteredAndSorted.slice((currentPage - 1) * ITEMS_PER_PAGE, currentPage * ITEMS_PER_PAGE);

      useEffect(() => { setCurrentPage(1); }, [filter, subFilter, keyword, startDate, endDate]);

      const todoStats = useMemo(() => {
        let total = 0, completed = 0;
        filteredAndSorted.forEach(item => { if (item.type === 'todo') { (item.content || '').split('\n').forEach(line => { if (line.includes('- [ ]') || line.includes('- [x]')) { total++; if (line.includes('- [x]')) completed++; } }); } });
        return { total, completed, percent: total === 0 ? 0 : Math.round((completed / total) * 100) };
      }, [filteredAndSorted]);

      return (
        <div className={`w-full max-w-7xl mx-auto px-4 py-2 h-full flex flex-col font-sans transition-colors duration-300 ${isDarkMode ? 'bg-slate-900 text-slate-100' : 'bg-slate-50 text-slate-900'}`}>
          <header className={`sticky top-0 z-40 border-b backdrop-blur-xl transition-colors duration-300 ${isDarkMode ? 'bg-slate-900/80 border-slate-700/50' : 'bg-white/80 border-slate-200/50'}`}>
            <div className="py-3 flex justify-between items-center flex-wrap gap-2">
              <div className="flex items-center gap-2">
                <div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold">📋</div>
                <h1 className="text-lg font-black tracking-tighter hidden sm:block">資訊牆 V12.6</h1>
              </div>
              <div className="flex items-center gap-2 flex-wrap">
                {pwaPrompt && <button onClick={installPWA} className="px-3 py-1.5 bg-blue-500 text-white rounded-lg text-xs font-black transition-colors hover:bg-blue-600">📥 安裝桌面版</button>}
                <button onClick={handleExport} className="px-3 py-1.5 bg-emerald-500 text-white rounded-lg text-xs font-black transition-colors hover:bg-emerald-600">匯出 CSV</button>
                <button onClick={() => setIsTagManagerOpen(true)} className={`px-3 py-1.5 rounded-lg text-xs font-black transition-colors ${isDarkMode ? 'bg-slate-800 text-slate-300' : 'bg-slate-100 text-slate-600'}`}>🏷️ 標籤管理</button>
                <button onClick={() => setIsDarkMode(!isDarkMode)} className={`p-2 rounded-lg text-xs font-bold transition-colors ${isDarkMode ? 'bg-slate-800 text-yellow-400' : 'bg-slate-100 text-slate-600'}`}>{isDarkMode ? '☀️' : '🌙'}</button>
                <button onClick={() => { setIsManageMode(!isManageMode); setSelectedIds(new Set()); }} className={`px-3 py-1.5 rounded-lg text-xs font-black transition-colors ${isManageMode ? 'bg-indigo-600 text-white' : (isDarkMode ? 'bg-slate-800 text-slate-300' : 'bg-slate-100 text-slate-600')}`}>批次管理</button>
                {profile && <img src={profile.pictureUrl} className="w-8 h-8 rounded-lg object-cover border border-slate-200" alt="" />}
              </div>
            </div>
            
            {(filter === '全部' || filter === '待辦') && todoStats.total > 0 && (
              <div className="pb-3 px-1">
                <div className="flex justify-between text-xs font-bold mb-1"><span className="text-slate-400">任務達成率</span><span className="text-indigo-500">{todoStats.percent}% ({todoStats.completed}/{todoStats.total})</span></div>
                <div className="w-full h-1.5 bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden"><div className="h-full bg-indigo-500 transition-all duration-500" style={{ width: `${todoStats.percent}%` }}></div></div>
              </div>
            )}

            <div className="pb-3 flex flex-col sm:flex-row gap-3 sm:items-start justify-between">
              <div className="flex gap-1.5 overflow-x-auto no-scrollbar py-1">
                {['全部', '待辦', '行程', '好文', '檔案'].map(t => (
                  <button key={t} onClick={() => { setFilter(t); setSubFilter('全部'); }} className={`px-4 py-1.5 rounded-xl text-[11px] font-black whitespace-nowrap transition-all ${filter === t ? 'bg-indigo-600 text-white shadow-md' : (isDarkMode ? 'bg-slate-800 text-slate-400' : 'bg-white text-slate-400 border border-slate-200/60')}`}>{t}</button>
                ))}
              </div>
              <div className="flex flex-col gap-2 w-full sm:w-auto">
                <form onSubmit={handleSearch} className="flex gap-2">
                  <input type="text" value={keyword} onChange={(e) => setKeyword(e.target.value)} placeholder="搜尋關鍵字..." className={`px-3 py-1.5 rounded-lg text-sm focus:outline-none flex-1 sm:w-48 transition-colors ${isDarkMode ? 'bg-slate-800 text-white border-slate-700' : 'bg-white border-slate-200'}`} />
                  <button type="button" onClick={() => setShowAdvanced(!showAdvanced)} className={`px-3 py-1.5 rounded-lg text-sm font-bold transition-colors ${showAdvanced ? 'bg-indigo-100 text-indigo-700 dark:bg-indigo-900 dark:text-indigo-300' : 'bg-slate-100 text-slate-600 dark:bg-slate-800 dark:text-slate-300'}`}>進階</button>
                  <button type="submit" className="px-3 py-1.5 bg-indigo-600 text-white rounded-lg text-sm font-bold">搜尋</button>
                </form>
                {showAdvanced && (
                  <div className={`flex gap-2 p-2 rounded-lg text-xs w-full animate-fade-in ${isDarkMode ? 'bg-slate-800' : 'bg-slate-100'}`}>
                    <div className="flex flex-col gap-1 flex-1">
                      <label className="text-[10px] text-slate-500 font-bold">開始日期</label>
                      <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} className={`px-2 py-1 rounded border outline-none ${isDarkMode ? 'bg-slate-900 border-slate-700 text-white' : 'bg-white border-slate-200 text-slate-800'}`} />
                    </div>
                    <div className="flex flex-col gap-1 flex-1">
                      <label className="text-[10px] text-slate-500 font-bold">結束日期</label>
                      <input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} className={`px-2 py-1 rounded border outline-none ${isDarkMode ? 'bg-slate-900 border-slate-700 text-white' : 'bg-white border-slate-200 text-slate-800'}`} />
                    </div>
                  </div>
                )}
              </div>
            </div>
            
            {filter === '好文' && subcategories.length > 1 && (
              <div className="pb-3 flex gap-2 overflow-x-auto no-scrollbar">
                {subcategories.map(sub => (
                  <button key={sub} onClick={() => setSubFilter(sub)} className={`px-3 py-1 rounded-full text-[10px] font-bold whitespace-nowrap transition-all ${subFilter === sub ? 'bg-emerald-500 text-white' : (isDarkMode ? 'bg-slate-700 text-slate-300' : 'bg-slate-100 text-slate-500')}`}>
                    # {sub}
                  </button>
                ))}
              </div>
            )}

            {isManageMode && (
              <div className={`py-2 border-t flex justify-between items-center ${isDarkMode ? 'border-slate-700 bg-slate-800/50' : 'border-slate-200 bg-indigo-50/50'}`}>
                <span className="text-sm font-bold text-indigo-500">已選擇 {selectedIds.size} 筆</span>
                <div className="flex gap-2">
                  <button onClick={handleBatchArchive} disabled={selectedIds.size === 0 || isProcessing} className="px-4 py-1.5 bg-amber-500 text-white rounded-lg text-xs font-bold disabled:opacity-50">封存選取</button>
                  <button onClick={handleBatchDelete} disabled={selectedIds.size === 0 || isProcessing} className="px-4 py-1.5 bg-red-500 text-white rounded-lg text-xs font-bold disabled:opacity-50">刪除選取</button>
                </div>
              </div>
            )}
          </header>

          <main className="py-6 flex-1 pb-24">
            <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4 items-start">
              {currentItems.map(item => {
                const thumb = getThumbnail(item?.url);
                const isSelected = selectedIds.has(item?.id);
                const isCompleted = item?.title?.includes('[已完成]');
                const isGCal = String(item?.id).startsWith('gcal-');
                
                return (
                  <div key={item?.id} onClick={() => isManageMode && toggleSelection(item.id)} className={`virtual-card group rounded-2xl border shadow-sm transition-all overflow-hidden flex flex-col relative ${isManageMode ? 'cursor-pointer' : ''} ${isDarkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-100'} ${isSelected ? 'ring-2 ring-indigo-500' : ''} ${isCompleted ? 'opacity-50 grayscale-[50%]' : ''}`}>
                    
                    {!isManageMode && !isGCal && (
                      <div className="absolute top-2 right-2 z-20 flex gap-1 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity">
                        <button type="button" onClick={(e) => { e.preventDefault(); e.stopPropagation(); setEditingItem({...item}); }} className="w-8 h-8 bg-blue-500 text-white rounded-full flex items-center justify-center text-xs shadow active:scale-95 cursor-pointer">✏️</button>
                        <button type="button" onClick={(e) => { e.preventDefault(); e.stopPropagation(); setConfirmDelete({id: item.id, url: item.url}); }} className="w-8 h-8 bg-red-500 text-white rounded-full flex items-center justify-center text-xs shadow active:scale-95 cursor-pointer">✕</button>
                      </div>
                    )}
                    
                    {item?.type === 'file' && thumb && (
                      <div onClick={(e) => { if (!isManageMode) handleOpenUrl(e, item.url); }} className="w-full h-32 overflow-hidden cursor-pointer">
                        <LazyImage src={thumb} alt="" className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                      </div>
                    )}

                    <div className="p-4">
                      <div className="flex items-center gap-2 mb-3 flex-wrap">
                        <div className={`px-2 py-1 rounded text-[10px] font-black uppercase ${item?.color || 'bg-slate-100 text-slate-600'} ${isDarkMode && item?.color?.includes('slate') ? 'bg-slate-700 text-slate-300' : ''}`}>
                          {item?.icon} {item?.type?.toUpperCase()}
                        </div>
                        {item?.type === 'article' && getTags(item.subcategory).map(tag => (
                           <span key={tag} className="px-2 py-1 rounded text-[10px] font-bold bg-emerald-100 text-emerald-700 dark:bg-emerald-900/50 dark:text-emerald-400">
                             {tag}
                           </span>
                        ))}
                        <span className="text-[10px] font-bold text-slate-400 ml-auto whitespace-nowrap">{item?.date} {item?.time}</span>
                      </div>
                      
                      <h2 onClick={(e) => { if (!isManageMode && item?.type !== 'todo' && item?.url) handleOpenUrl(e, item.url); }} className={`text-base font-black leading-tight mb-2 ${isDarkMode ? 'text-slate-100' : 'text-slate-800'} ${item?.type !== 'todo' && !isManageMode ? 'cursor-pointer hover:text-indigo-500' : ''}`}>
                        {item?.title ?? '無標題'}
                      </h2>
                      
                      {item?.type === 'todo' ? (
                        <div className="space-y-2 mt-3">
                          {(item?.content || '').split('\n').map((line, idx) => {
                            const isChecked = line.includes('- [x]');
                            const isTodo = line.includes('- [ ]') || isChecked;
                            if (!isTodo) return <p key={idx} className="text-xs text-slate-500">{line}</p>;
                            return (
                              <div key={idx} className="flex items-start gap-2 cursor-pointer group/todo" onClick={(e) => { if (!isManageMode) handleToggleTodo(item.id, item.content, idx); e.stopPropagation(); }}>
                                <div className={`mt-0.5 flex-shrink-0 w-4 h-4 rounded border flex items-center justify-center transition-colors ${isChecked ? 'bg-indigo-500 border-indigo-500 text-white' : 'border-slate-400 group-hover/todo:border-indigo-400'}`}>
                                  {isChecked && <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" /></svg>}
                                </div>
                                <span className={`text-sm font-medium ${isChecked ? 'text-slate-500 line-through' : ''}`}>{line.replace(/- \[(x| )\] /, '')}</span>
                              </div>
                            );
                          })}
                          {!isManageMode && !isGCal && (
                            <div className="mt-4 flex flex-col gap-2">
                              <button onClick={(e) => handleToggleCompleted(item, e)} className={`flex items-center justify-center gap-2 w-full py-2 rounded-xl text-xs font-black transition-colors ${isCompleted ? (isDarkMode ? 'bg-slate-700 hover:bg-slate-600 text-slate-300' : 'bg-slate-200 hover:bg-slate-300 text-slate-600') : (isDarkMode ? 'bg-emerald-900/50 hover:bg-emerald-800/50 text-emerald-400' : 'bg-emerald-50 hover:bg-emerald-100 text-emerald-600')}`}>
                                {isCompleted ? '↺ 取消完成' : '✅ 標示為完成'}
                              </button>
                            </div>
                          )}
                        </div>
                      ) : ( <div className="rounded-xl p-3 text-xs font-medium leading-relaxed max-h-[120px] overflow-y-auto whitespace-pre-wrap" dangerouslySetInnerHTML={{ __html: DOMPurify.sanitize(item?.content ?? '') }} /> )}

                      {item?.type === 'event' && (
                        <div className="mt-4 flex flex-col gap-2">
                          <a href={item?.url && item.url !== '#' ? item.url : generateCalendarUrl(item?.title, item?.content)} target="_blank" rel="noreferrer" className={`flex items-center justify-center gap-2 w-full py-2 rounded-xl text-xs font-black transition-colors ${isDarkMode ? 'bg-blue-900/50 hover:bg-blue-800/50 text-blue-400' : 'bg-blue-50 hover:bg-blue-100 text-blue-600'}`}>
                            📅 檢視 / 加入 Google 行事曆
                          </a>
                          {!isManageMode && !isGCal && (
                            <button onClick={(e) => handleToggleCompleted(item, e)} className={`flex items-center justify-center gap-2 w-full py-2 rounded-xl text-xs font-black transition-colors ${isCompleted ? (isDarkMode ? 'bg-slate-700 hover:bg-slate-600 text-slate-300' : 'bg-slate-200 hover:bg-slate-300 text-slate-600') : (isDarkMode ? 'bg-emerald-900/50 hover:bg-emerald-800/50 text-emerald-400' : 'bg-emerald-50 hover:bg-emerald-100 text-emerald-600')}`}>
                              {isCompleted ? '↺ 取消完成' : '✅ 標示為完成'}
                            </button>
                          )}
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
            
            {!isLoading && totalPages > 1 && (
              <div className="flex justify-center items-center gap-4 mt-8 pb-8">
                <button onClick={() => setCurrentPage(p => Math.max(1, p - 1))} disabled={currentPage === 1} className={`px-4 py-2 rounded-xl font-bold text-sm transition-colors ${currentPage === 1 ? 'opacity-50 cursor-not-allowed' : 'hover:bg-indigo-500 hover:text-white'} ${isDarkMode ? 'bg-slate-800 text-slate-300' : 'bg-white text-slate-600 shadow-sm border border-slate-200'}`}>上一頁</button>
                <span className={`text-sm font-bold ${isDarkMode ? 'text-slate-400' : 'text-slate-500'}`}>第 {currentPage} / {totalPages} 頁</span>
                <button onClick={() => setCurrentPage(p => Math.min(totalPages, p + 1))} disabled={currentPage === totalPages} className={`px-4 py-2 rounded-xl font-bold text-sm transition-colors ${currentPage === totalPages ? 'opacity-50 cursor-not-allowed' : 'hover:bg-indigo-500 hover:text-white'} ${isDarkMode ? 'bg-slate-800 text-slate-300' : 'bg-white text-slate-600 shadow-sm border border-slate-200'}`}>下一頁</button>
              </div>
            )}
            
            {isLoading && !isError && <div className="py-10 text-center text-indigo-400 font-bold animate-pulse text-sm">數據同步中...</div>}
          </main>

          {isTagManagerOpen && (
            <div className="fixed inset-0 z-[9999] flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-sm">
              <div className={`rounded-[2rem] p-6 w-full max-w-md shadow-2xl flex flex-col max-h-[90vh] ${isDarkMode ? 'bg-slate-800 text-white' : 'bg-white text-slate-800'}`}>
                <h3 className="text-lg font-black mb-2 flex-shrink-0">🏷️ 標籤管理與自動記憶</h3>
                <p className="text-xs text-slate-500 mb-4 font-medium leading-relaxed flex-shrink-0">將散亂的同義標籤合併，系統將會寫入自動修正字典。未來 AI 分類時，會優先引用標準標籤庫並自動校正同義詞。</p>
                <div className="space-y-4 overflow-y-auto flex-1 pr-2 no-scrollbar">
                  <div>
                    <label className="text-xs font-bold text-slate-500 mb-2 block">請點選要合併的原始標籤 (可多選)</label>
                    <div className="flex flex-wrap gap-2 mb-3">
                      {subcategories.filter(t => t !== '全部' && t !== '未分類').map(t => {
                        const isSelected = tagMergeSources.includes(t);
                        return (
                          <button
                            key={t}
                            onClick={() => {
                              if (isSelected) setTagMergeSources(prev => prev.filter(tag => tag !== t));
                              else setTagMergeSources(prev => [...prev, t]);
                            }}
                            className={`px-3 py-1.5 rounded-full text-xs font-bold transition-all ${isSelected ? 'bg-indigo-500 text-white shadow-md scale-105' : (isDarkMode ? 'bg-slate-700 text-slate-300 hover:bg-slate-600' : 'bg-slate-100 text-slate-600 hover:bg-slate-200')}`}
                          >
                            {t} {isSelected && '✓'}
                          </button>
                        );
                      })}
                    </div>
                    {tagMergeSources.length > 0 && (
                      <div className={`p-3 rounded-xl text-sm mb-4 animate-fade-in ${isDarkMode ? 'bg-indigo-900/30 border border-indigo-700/50' : 'bg-indigo-50 border border-indigo-200'}`}>
                        <span className="text-xs font-bold text-indigo-500 block mb-2">已選候選區 ({tagMergeSources.length})：</span>
                        <div className="flex flex-wrap gap-1.5">
                          {tagMergeSources.map(t => <span key={t} className="px-2 py-1 bg-indigo-500 text-white rounded-lg text-xs font-bold shadow-sm">{t}</span>)}
                        </div>
                      </div>
                    )}
                  </div>
                  <div>
                    <label className="text-xs font-bold text-slate-500 mb-1 block">合併為標準標籤 (可自訂新名稱)</label>
                    <input type="text" list="standard-tags" value={tagMergeTarget} onChange={e => setTagMergeTarget(e.target.value)} placeholder="例如：人工智慧" className={`w-full p-3 rounded-xl text-sm font-bold outline-none border focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all ${isDarkMode ? 'bg-slate-900 border-slate-700 text-white' : 'bg-slate-50 border-slate-200'}`} />
                    <datalist id="standard-tags">
                      {subcategories.filter(t => t !== '全部' && t !== '未分類').map(t => <option key={t} value={t} />)}
                    </datalist>
                  </div>
                </div>
                <div className="flex gap-3 mt-6 flex-shrink-0 pt-4 border-t border-slate-200 dark:border-slate-700">
                  <button onClick={() => {setIsTagManagerOpen(false); setTagMergeSources([]); setTagMergeTarget('');}} className={`flex-1 py-3 rounded-xl font-black text-sm transition-colors ${isDarkMode ? 'bg-slate-700 hover:bg-slate-600 text-slate-200' : 'bg-slate-100 hover:bg-slate-200 text-slate-700'}`}>取消</button>
                  <button onClick={handleMergeTags} disabled={isProcessing || tagMergeSources.length === 0 || !tagMergeTarget || tagMergeSources.includes(tagMergeTarget)} className="flex-[2] py-3 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-black text-sm shadow-lg active:scale-95 transition-all disabled:opacity-50 disabled:active:scale-100 flex items-center justify-center gap-2">
                    {isProcessing ? <div className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div> : '合併並建立規則'}
                  </button>
                </div>
              </div>
            </div>
          )}

          <button onClick={() => setIsAskAiOpen(!isAskAiOpen)} className="fixed bottom-6 right-6 z-50 w-14 h-14 bg-indigo-600 rounded-full shadow-2xl flex items-center justify-center text-white text-2xl hover:scale-110 transition-transform">✨</button>
          
          {isAskAiOpen && (
            <div className={`fixed bottom-24 right-6 z-[9999] w-[calc(100%-3rem)] sm:w-96 rounded-3xl shadow-2xl border flex flex-col overflow-hidden transition-colors ${isDarkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-200'}`}>
              <div className="p-4 bg-indigo-600 text-white font-black flex justify-between items-center">
                <span>知識庫專屬助理</span>
                <button onClick={() => setIsAskAiOpen(false)} className="opacity-70 hover:opacity-100 text-lg">✕</button>
              </div>
              <div className="p-4 flex-1 h-64 overflow-y-auto flex flex-col gap-3 text-sm">
                <div className="bg-indigo-50 dark:bg-indigo-900/30 text-indigo-800 dark:text-indigo-200 p-3 rounded-2xl rounded-tl-none self-start max-w-[90%]">您好！您可以針對目前畫面上過濾出的資料問我任何問題。</div>
                {askAiResponse && <div className="bg-slate-100 dark:bg-slate-700 p-3 rounded-2xl rounded-tl-none self-start max-w-[90%] whitespace-pre-wrap leading-relaxed">{askAiResponse}</div>}
                {isAskAiLoading && <div className="text-indigo-500 font-bold animate-pulse text-xs ml-2">分析大腦知識庫中...</div>}
              </div>
              <div className="p-3 border-t dark:border-slate-700 flex gap-2">
                <input type="text" value={askAiQuery} onChange={(e) => setAskAiQuery(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleAskAI()} placeholder="詢問當前分類的資料..." className={`flex-1 px-3 py-2 rounded-xl text-sm outline-none border ${isDarkMode ? 'bg-slate-900 border-slate-700 text-white' : 'bg-slate-50 border-slate-200'}`} />
                <button onClick={handleAskAI} disabled={isAskAiLoading || !askAiQuery.trim()} className="bg-indigo-600 text-white px-4 rounded-xl text-sm font-bold disabled:opacity-50 hover:bg-indigo-700 transition-colors">送出</button>
              </div>
            </div>
          )}

          {editingItem && (
            <div className="fixed inset-0 z-[9999] flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-sm">
              <div className={`rounded-[2rem] p-6 w-full max-w-md shadow-2xl ${isDarkMode ? 'bg-slate-800 text-white' : 'bg-white text-slate-800'}`}>
                <h3 className="text-lg font-black mb-4">編輯紀錄</h3>
                <div className="space-y-4">
                  <div>
                    <label className="text-xs font-bold text-slate-500 mb-1 block">分類</label>
                    <select value={editingItem.type || 'article'} onChange={e => setEditingItem({...editingItem, type: e.target.value})} className={`w-full p-2 rounded-xl text-sm outline-none border ${isDarkMode ? 'bg-slate-900 border-slate-700 text-white' : 'bg-slate-50 border-slate-200'}`}>
                      <option value="article">好文</option><option value="todo">待辦</option>
                      <option value="event">行程</option><option value="file">檔案</option>
                    </select>
                  </div>
                  {editingItem.type === 'article' && (
                    <div>
                      <label className="text-xs font-bold text-slate-500 mb-1 block">多重次分類 (用逗號分隔)</label>
                      <input type="text" value={editingItem.subcategory || ''} onChange={e => setEditingItem({...editingItem, subcategory: e.target.value})} placeholder="例如：科技, 設計, 學習" className={`w-full p-2 rounded-xl text-sm outline-none border ${isDarkMode ? 'bg-slate-900 border-slate-700 text-white' : 'bg-slate-50 border-slate-200'}`} />
                      <div className="flex flex-wrap gap-1.5 mt-2">
                        {subcategories.filter(t => t !== '全部' && t !== '未分類').map(tag => {
                          const currentTags = (editingItem.subcategory || '').split(/[,、]/).map(t => t.trim()).filter(Boolean);
                          const isSelected = currentTags.includes(tag);
                          return (
                            <button
                              key={tag}
                              onClick={() => {
                                if (isSelected) {
                                  setEditingItem({...editingItem, subcategory: currentTags.filter(t => t !== tag).join(', ')});
                                } else {
                                  setEditingItem({...editingItem, subcategory: [...currentTags, tag].join(', ')});
                                }
                              }}
                              className={`px-2 py-1 rounded-md text-[10px] font-bold transition-colors ${isSelected ? 'bg-indigo-500 text-white' : (isDarkMode ? 'bg-slate-700 text-slate-300 hover:bg-slate-600' : 'bg-slate-200 text-slate-600 hover:bg-slate-300')}`}
                            >
                              {tag}
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  )}
                  <div>
                    <label className="text-xs font-bold text-slate-500 mb-1 block">標題</label>
                    <input type="text" value={editingItem.title || ''} onChange={e => setEditingItem({...editingItem, title: e.target.value})} className={`w-full p-2 rounded-xl text-sm outline-none border ${isDarkMode ? 'bg-slate-900 border-slate-700 text-white' : 'bg-slate-50 border-slate-200'}`} />
                  </div>
                  <div>
                    <label className="text-xs font-bold text-slate-500 mb-1 block">內容</label>
                    <textarea rows={5} value={editingItem.content || ''} onChange={e => setEditingItem({...editingItem, content: e.target.value})} className={`w-full p-2 rounded-xl text-sm outline-none border resize-none ${isDarkMode ? 'bg-slate-900 border-slate-700 text-white' : 'bg-slate-50 border-slate-200'}`} />
                  </div>
                </div>
                <div className="flex gap-3 mt-6">
                  <button onClick={() => setEditingItem(null)} className={`flex-1 py-2.5 rounded-xl font-black text-sm ${isDarkMode ? 'bg-slate-700 hover:bg-slate-600' : 'bg-slate-100 hover:bg-slate-200'}`}>取消</button>
                  <button onClick={saveEdit} disabled={isProcessing} className="flex-1 py-2.5 rounded-xl bg-indigo-600 text-white font-black text-sm shadow-lg active:scale-95 transition-all">儲存變更</button>
                </div>
              </div>
            </div>
          )}

          {confirmDelete && (
            <div className="fixed inset-0 z-[9999] flex items-center justify-center p-6 bg-slate-900/80 backdrop-blur-sm">
              <div className={`rounded-[2rem] p-8 max-w-sm w-full shadow-2xl ${isDarkMode ? 'bg-slate-800' : 'bg-white'}`}>
                <h3 className={`text-xl font-black mb-2 ${isDarkMode ? 'text-white' : 'text-slate-800'}`}>確認刪除？</h3>
                <p className="text-sm text-slate-500 font-medium mb-8">刪除後無法還原。</p>
                <div className="flex gap-3">
                  <button onClick={() => setConfirmDelete(null)} className={`flex-1 py-3 rounded-2xl font-black text-sm ${isDarkMode ? 'bg-slate-700 text-white' : 'bg-slate-100 text-slate-600'}`}>取消</button>
                  <button onClick={executeDelete} disabled={isProcessing} className="flex-1 py-3 rounded-2xl bg-red-600 text-white font-black text-sm shadow-lg active:scale-95">確定刪除</button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
